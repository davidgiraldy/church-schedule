<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPW - Weekly Service Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <img src="assets/logo-icon.svg" alt="GBI House of Happiness" class="topbar-logo" />
      <h1>PPW - Weekly Service Schedule</h1>
      <div class="topbar-actions">
        <button id="btn-view-people" class="btn btn-small">People</button>
        <button id="btn-new-schedule" class="btn btn-primary">+ Add Schedule</button>
      </div>
    </div>
  </header>

  <div id="filter-bar" class="filter-bar">
    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-mode="upcoming">Upcoming</button>
      <button class="filter-tab" data-mode="all">All</button>
      <button class="filter-tab" data-mode="month">Month</button>
      <button class="filter-tab" data-mode="custom">Custom Range</button>
    </div>
    <div id="custom-range" class="custom-range hidden">
      <input type="date" id="filter-from" />
      <span class="range-sep">to</span>
      <input type="date" id="filter-to" />
      <button id="btn-apply-filter" class="btn btn-small btn-primary">Apply</button>
      <button id="btn-clear-filter" class="btn btn-small">Clear</button>
    </div>
    <div id="month-range" class="custom-range hidden">
      <select id="filter-month-select"></select>
      <select id="filter-year-select"></select>
    </div>
  </div>

  <main id="schedule-list" class="schedule-list">
    <p class="loading">Loading schedules...</p>
  </main>

  <main id="people-view" class="schedule-list hidden">
    <input type="text" id="people-search" class="people-search" placeholder="Search name..." />
    <div id="people-list"></div>
  </main>

  <datalist id="people-datalist"></datalist>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Add Schedule</h2>
        <button id="btn-close-modal" class="btn-icon">&times;</button>
      </div>
      <form id="schedule-form" class="modal-body">
        <input type="hidden" id="schedule-id" />

        <div class="field-row">
          <label for="service-date">Date</label>
          <input type="date" id="service-date" required />
          <p id="date-error" class="field-error hidden">A schedule for this date already exists.</p>
        </div>

        <div class="field-row">
          <label for="schedule-label">Note (optional)</label>
          <input type="text" id="schedule-label" placeholder="e.g. Good Friday, Easter" />
        </div>

        <div class="field-block">
          <div class="field-block-header">
            <label>Service Times</label>
            <button type="button" id="btn-add-time" class="btn btn-small">+ Time</button>
          </div>
          <div id="times-list" class="times-list"></div>
        </div>

        <div class="field-block">
          <div class="field-block-header">
            <label>Dress Code Image (optional)</label>
          </div>
          <img id="dress-code-preview" class="dresscode-preview hidden" alt="Dress code preview" />
          <div class="dresscode-controls">
            <input type="file" id="dress-code-file" accept="image/*" />
            <button type="button" id="btn-remove-dresscode" class="btn btn-small hidden">Remove</button>
          </div>
          <textarea id="dress-code-notes" class="dresscode-notes" rows="3" placeholder="Dress code details, one point per line, e.g.&#10;Outer / Shirt (Jeans/Denim)&#10;Pants/Skirt (Denim/Black/White)&#10;Sneakers"></textarea>
        </div>

        <div class="field-block">
          <div class="field-block-header">
            <label>Assignments</label>
            <div class="field-block-actions">
              <button type="button" id="btn-add-role" class="btn btn-small hidden">+ Role</button>
              <button type="button" id="btn-toggle-role-edit" class="btn btn-small">Edit Roles</button>
            </div>
          </div>
          <div id="assignments-list" class="assignments-list"></div>
        </div>

        <div class="modal-footer">
          <button type="button" id="btn-delete-schedule" class="btn btn-danger hidden">Delete Schedule</button>
          <div class="modal-footer-right">
            <button type="button" id="btn-cancel" class="btn">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
